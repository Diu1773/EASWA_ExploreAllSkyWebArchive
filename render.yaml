services:
  - type: web
    name: easwa-webapp
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: EASWA_DEBUG
        value: "false"
      - key: EASWA_SESSION_SECRET
        generateValue: true
      - key: EASWA_RECORD_REQUIRE_LOGIN
        value: "false"
